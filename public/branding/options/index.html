<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevTools Lab Branding Option A v6</title>
    <style>
      body {
        margin: 0;
        padding: 24px;
        font-family: Arial, Helvetica, sans-serif;
        background: #f8fafc;
        color: #0f172a;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 24px;
      }
      p {
        margin: 0 0 16px;
        color: #64748b;
      }
      .card {
        max-width: 640px;
        border: 1px solid #dbe2ea;
        border-radius: 12px;
        background: #fff;
        padding: 14px;
      }
      .row {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .row img {
        width: 40px;
        height: 40px;
      }
      .logo {
        margin-top: 10px;
        width: 100%;
        height: auto;
        border: 1px solid #eef2f7;
        border-radius: 10px;
        background: #fff;
      }
      .logo--mark {
        max-width: 220px;
        padding: 16px;
      }
      .path {
        margin-top: 8px;
        font-size: 12px;
        color: #64748b;
      }
      .stack {
        display: grid;
        gap: 16px;
      }
    </style>
  </head>
  <body>
    <h1>Option A</h1>
    <p>6차 only</p>
    <div class="stack">
      <section class="card">
        <div class="row"><img src="./favicon-option-a-v6.svg" alt="Option A v6 favicon" /><strong>A안 6차</strong></div>
        <img class="logo" src="./logo-option-a-v6.svg" alt="Option A v6 logo" />
        <div class="path">logo-option-a-v6.svg / favicon-option-a-v6.svg</div>
      </section>
      <section class="card">
        <div class="row"><img src="./lab-button-mark-braces-slash.svg" alt="Lab button mark braces slash" /><strong>LAB button mark</strong></div>
        <img class="logo logo--mark" src="./lab-button-mark-braces-slash.svg" alt="Lab button mark braces slash preview" />
        <div class="path">lab-button-mark-braces-slash.svg</div>
      </section>
    </div>
  </body>
</html>
